name: NSE Daily Fetcher

on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4        # ← updated from v3

      - name: Setup Python
        uses: actions/setup-python@v5    # ← updated from v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch NSE data
        run: python nse_fetcher.py

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "NSE data - $(date +'%d-%b-%Y')"
          git push